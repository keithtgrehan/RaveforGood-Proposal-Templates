<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Rave for Good e.V. — Proposal</title>

  <body>

    <!-- ── Export bar ────────────────────────────────────────────────────── -->
    <div class="export-bar">
      <span id="export-bar-label"></span>
      <button class="export-btn" onclick="window.print()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M3 6V3h10v3M3 11H1V7h14v4h-2M3 11v2h10v-2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>

    <!-- ═══════════════════════════════════════════════════════════════════
         PAGE 1 — PROPOSAL
    ══════════════════════════════════════════════════════════════════════ -->
    <div class="page page-1">

      <!-- Masthead -->
      <header class="masthead">
        <div class="masthead-left">
          <img src="/logo.png" alt="Rave for Good" class="logo" />
          <span class="masthead-org" id="masthead-org"></span>
        </div>
        <div class="masthead-meta" id="masthead-meta"></div>
      </header>

      <span class="rule rule--full masthead-rule"></span>

      <!-- Hero -->
      <div class="hero">
        <div class="hero-left">
          <span class="hero-label" id="hero-label"></span>
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-tagline" id="hero-tagline"></p>
        </div>
        <div class="hero-right">
          <div class="hero-address-label" id="hero-address-label"></div>
          <div class="hero-address" id="hero-address"></div>
          <div class="hero-address-sub" id="hero-address-sub"></div>
        </div>
      </div>

      <span class="rule hero-rule"></span>

      <!-- Body: 2×2 grid -->
      <div class="body-grid" id="body-grid"></div>

      <!-- Footer -->
      <span class="rule footer-rule"></span>
      <div class="page-footer">
        <span class="page-number" id="p1-page-num"></span>
        <span class="footer-identity" id="p1-identity"></span>
        <span class="footer-url" id="footer-url-1"></span>
      </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         PAGE 2 — TRACK RECORD + SETUP + AWARENESS + QUESTIONS
    ══════════════════════════════════════════════════════════════════════ -->
    <div class="page page-2">

      <!-- Header -->
      <div class="page2-header">
        <div class="page2-title-row">
          <div>
            <div class="page2-title" id="track-title"></div>
            <div class="page2-subtitle" id="track-subtitle"></div>
          </div>
        </div>
        <span class="rule rule--full"></span>
      </div>

      <!-- Track grid: flyers left, event details right -->
      <div class="track-grid">
        <div class="flyers-col" id="flyers-col"></div>

        <div class="info-col">
          <div id="events-list"></div>

          <div class="bisherige-block">
            <div class="bisherige-label" id="stats-label"></div>
            <div class="bisherige-stats" id="stats-grid"></div>
            <p class="bisherige-note" id="stats-note"></p>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <span class="rule lower-divider"></span>

      <!-- Lower 3-col -->
      <div class="lower-grid" id="lower-grid"></div>

      <!-- Contact -->
      <div class="contact-block">
        <div class="contact-label" id="contact-label"></div>
        <div class="contact-grid" id="contact-grid"></div>
      </div>

      <!-- Footer -->
      <span class="rule footer-rule"></span>
      <div class="page-footer">
        <span class="page-number" id="p2-page-num"></span>
        <span class="footer-identity" id="p2-identity"></span>
        <span class="footer-url" id="footer-url-2"></span>
      </div>

    </div><!-- /page-2 -->
